<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stato dei Servizi - Soccorso Digitale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F9FAFB; color: #1F2937; }
    .header { background: linear-gradient(135deg, #0066CC 0%, #003D7A 100%); padding: 32px 0; text-align: center; }
    .header h1 { color: #fff; font-size: 28px; letter-spacing: 1px; }
    .header p { color: rgba(255,255,255,0.85); font-size: 14px; margin-top: 8px; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    .status-banner { padding: 24px; border-radius: 12px; text-align: center; margin-bottom: 32px; }
    .status-operational { background: #F0FDF4; border: 1px solid #BBF7D0; }
    .status-degraded { background: #FFF7ED; border: 1px solid #FED7AA; }
    .status-outage { background: #FEF2F2; border: 1px solid #FECACA; }
    .status-banner .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .dot-green { background: #16A34A; }
    .dot-yellow { background: #D97706; }
    .dot-red { background: #DC2626; }
    .status-banner h2 { font-size: 20px; display: inline; vertical-align: middle; }
    .status-banner p { margin-top: 8px; color: #6B7280; font-size: 13px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #374151; }
    .services-grid { display: grid; gap: 12px; margin-bottom: 32px; }
    .service-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .service-name { font-weight: 500; font-size: 15px; }
    .service-status { font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    .service-healthy { background: #DCFCE7; color: #166534; }
    .service-degraded { background: #FEF3C7; color: #92400E; }
    .service-unhealthy { background: #FEE2E2; color: #991B1B; }
    .service-meta { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
    .uptime-section { margin-bottom: 32px; }
    .uptime-bar-container { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .uptime-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .uptime-label { font-weight: 500; font-size: 14px; }
    .uptime-value { font-weight: 700; font-size: 14px; }
    .uptime-bar { height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
    .uptime-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .fill-green { background: #16A34A; }
    .fill-yellow { background: #D97706; }
    .fill-red { background: #DC2626; }
    .incidents-section { margin-bottom: 32px; }
    .incident-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .incident-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .incident-service { font-weight: 500; font-size: 14px; }
    .incident-badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 12px; }
    .badge-resolved { background: #DCFCE7; color: #166534; }
    .badge-open { background: #FEE2E2; color: #991B1B; }
    .incident-meta { font-size: 12px; color: #6B7280; }
    .no-incidents { text-align: center; padding: 32px; color: #6B7280; font-size: 14px; }
    .footer { text-align: center; padding: 24px; color: #9CA3AF; font-size: 12px; border-top: 1px solid #E5E7EB; margin-top: 16px; }
    .loading { text-align: center; padding: 48px; color: #6B7280; }
    .refresh-note { text-align: center; margin-bottom: 16px; font-size: 12px; color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SOCCORSO DIGITALE</h1>
    <p>Stato dei Servizi in Tempo Reale</p>
  </div>
  <div class="container" id="content">
    <div class="loading">Caricamento stato dei servizi...</div>
  </div>
  <div class="footer">
    Soccorso Digitale - Piattaforma Gestione Trasporti Sanitari<br>
    Aggiornamento automatico ogni 60 secondi
  </div>
  <script>
    const serviceNames = { api: "API Server", database: "Database PostgreSQL", storage: "Object Storage" };
    const statusLabels = { healthy: "Operativo", degraded: "Degradato", unhealthy: "Non Disponibile" };

    async function loadStatus() {
      try {
        const res = await fetch("/api/public/status");
        if (!res.ok) throw new Error("Errore API");
        const data = await res.json();
        renderStatus(data);
      } catch (err) {
        document.getElementById("content").innerHTML = '<div class="loading">Impossibile caricare lo stato dei servizi. Riprova tra qualche secondo.</div>';
      }
    }

    function renderStatus(data) {
      const container = document.getElementById("content");
      const statusMap = { operational: { cls: "status-operational", dot: "dot-green", text: "Tutti i Sistemi Operativi" },
                          degraded: { cls: "status-degraded", dot: "dot-yellow", text: "Prestazioni Degradate" },
                          major_outage: { cls: "status-outage", dot: "dot-red", text: "Interruzione in Corso" } };
      const s = statusMap[data.status] || statusMap.operational;
      const ts = new Date(data.timestamp).toLocaleString("it-IT");

      let html = `<div class="status-banner ${s.cls}"><span class="dot ${s.dot}"></span><h2>${s.text}</h2><p>Ultimo controllo: ${ts}</p></div>`;
      html += '<div class="refresh-note">I dati si aggiornano automaticamente ogni 60 secondi</div>';
      
      html += '<div class="section-title">Servizi</div><div class="services-grid">';
      for (const svc of data.services) {
        const name = serviceNames[svc.name] || svc.name;
        const label = statusLabels[svc.status] || svc.status;
        const cls = svc.status === "healthy" ? "service-healthy" : svc.status === "degraded" ? "service-degraded" : "service-unhealthy";
        html += `<div class="service-card"><div><div class="service-name">${name}</div><div class="service-meta">Tempo di risposta: ${svc.responseTimeMs}ms</div></div><span class="service-status ${cls}">${label}</span></div>`;
      }
      html += '</div>';
      
      html += '<div class="uptime-section"><div class="section-title">Uptime (ultimi 30 giorni)</div>';
      const up30 = data.uptime?.last30Days || {};
      if (Object.keys(up30).length > 0) {
        for (const [svc, pct] of Object.entries(up30)) {
          const name = serviceNames[svc] || svc;
          const fillCls = pct >= 99.9 ? "fill-green" : pct >= 99 ? "fill-yellow" : "fill-red";
          const color = pct >= 99.9 ? "#16A34A" : pct >= 99 ? "#D97706" : "#DC2626";
          html += `<div class="uptime-bar-container"><div class="uptime-header"><span class="uptime-label">${name}</span><span class="uptime-value" style="color:${color}">${pct}%</span></div><div class="uptime-bar"><div class="uptime-bar-fill ${fillCls}" style="width:${Math.min(pct, 100)}%"></div></div></div>`;
        }
      } else {
        html += '<div class="no-incidents">Dati uptime in fase di raccolta. Il monitoraggio proattivo e attivo ogni 5 minuti.</div>';
      }
      html += '</div>';
      
      html += '<div class="incidents-section"><div class="section-title">Incidenti Recenti (ultimi 30 giorni)</div>';
      if (data.incidents && data.incidents.length > 0) {
        for (const inc of data.incidents) {
          const svcName = serviceNames[inc.service] || inc.service;
          const date = new Date(inc.createdAt).toLocaleString("it-IT");
          const isResolved = !!inc.resolvedAt;
          const badgeCls = isResolved ? "badge-resolved" : "badge-open";
          const badgeText = isResolved ? "Risolto" : "In Corso";
          const dur = inc.durationMinutes ? `Durata: ${inc.durationMinutes} min` : "";
          html += `<div class="incident-card"><div class="incident-header"><span class="incident-service">${svcName}</span><span class="incident-badge ${badgeCls}">${badgeText}</span></div><div class="incident-meta">${date} ${dur ? "| " + dur : ""} ${inc.resolution ? "| " + inc.resolution : ""}</div></div>`;
        }
      } else {
        html += '<div class="no-incidents">Nessun incidente registrato negli ultimi 30 giorni.</div>';
      }
      html += '</div>';
      
      container.innerHTML = html;
    }

    loadStatus();
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
