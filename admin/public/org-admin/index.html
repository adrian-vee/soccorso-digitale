<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pannello Organizzazione - SOCCORSO DIGITALE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/admin/dashboard-redesign.css?v=20260324sb2">
  <link rel="stylesheet" href="/admin/css/nordic-rescue.css?v=1">
  <link rel="stylesheet" href="/admin/css/theme.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #0066CC;
      --primary-dark: #0055AA;
      --primary-light: #E6F0FF;
      --secondary: #00A651;
      --secondary-light: #E6F9F0;
      --background: #F8FAFC;
      --surface: #FFFFFF;
      --text-primary: #1A1F36;
      --text-secondary: #697386;
      --text-muted: #A3ACB9;
      --border: #E3E8EE;
      --border-light: #F0F3F7;
      --success: #00A651;
      --warning: #F5A623;
      --error: #E74C3C;
      --info: #3498DB;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-width: 280px;
      --topnav-height: 60px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.5; font-size: 14px; -webkit-font-smoothing: antialiased; }

    .hidden { display: none !important; }

    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #e8f4ff 100%); }
    .login-card { background: var(--surface); border-radius: var(--radius-xl); padding: 48px 40px; max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-size: 22px; font-weight: 700; margin-top: 16px; color: var(--text-primary); }
    .login-header p { color: var(--text-secondary); font-size: 13px; margin-top: 6px; }
    .login-logo { width: 64px; height: 64px; margin: 0 auto; }
    .login-logo svg { width: 64px; height: 64px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; transition: var(--transition); background: var(--surface); color: var(--text-primary); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: var(--transition); white-space: nowrap; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; box-shadow: 0 2px 8px rgba(0,102,204,0.25); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,102,204,0.35); }
    .btn-success { background: var(--secondary); color: white; }
    .btn-success:hover { background: #008a44; }
    .btn-outline { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--background); border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: var(--error); color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--primary-light); color: var(--primary); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-icon { width: 40px; height: 40px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .btn-icon:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .btn-icon svg { width: 18px; height: 18px; }

    .enterprise-layout { display: flex; min-height: 100vh; }

    .main-sidebar { width: var(--sidebar-width); background: linear-gradient(180deg, #1a1f36 0%, #0f1629 100%); color: white; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; overflow-y: auto; transition: transform 0.3s ease; }
    .sidebar-brand { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-brand .brand-name { font-size: 15px; font-weight: 700; color: white; display: block; letter-spacing: 0.5px; }
    .sidebar-brand .brand-subtitle { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-top: 2px; }

    .sidebar-search-box { display: flex; align-items: center; gap: 8px; margin: 12px 12px 4px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s ease; }
    .sidebar-search-box:focus-within { background: rgba(255,255,255,0.1); border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
    .sidebar-search-box svg { color: rgba(255,255,255,0.35); flex-shrink: 0; }
    .sidebar-search-box input { background: transparent; border: none; outline: none; color: rgba(255,255,255,0.9); font-size: 13px; font-family: inherit; flex: 1; width: 100%; }
    .sidebar-search-box input::placeholder { color: rgba(255,255,255,0.3); }
    .sidebar-search-kbd { display: inline-flex; align-items: center; justify-content: center; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.35); font-size: 11px; font-family: inherit; line-height: 1.4; flex-shrink: 0; }

    .sidebar-nav { flex: 1; padding: 8px 12px 16px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .nav-section { margin-bottom: 4px; }
    .nav-section-collapsible { margin-bottom: 2px; }
    .nav-section-header { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border-radius: 8px; background: transparent; border: none; color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s ease; text-align: left; font-family: inherit; }
    .nav-section-header:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.75); }
    .nav-section-header-icon { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; }
    .nav-section-header-label { flex: 1; }
    .nav-section-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; letter-spacing: 0; text-transform: none; }
    .nav-section-chevron { color: rgba(255,255,255,0.3); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; }
    .nav-section-header[aria-expanded="false"] .nav-section-chevron { transform: rotate(-90deg); }
    .nav-section-body { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease; opacity: 0; padding-left: 4px; }
    .nav-section-body.open { max-height: 1000px; opacity: 1; }
    .sidebar-search-highlight { background: rgba(59,130,246,0.35); color: white; border-radius: 2px; padding: 0 1px; }
    .nav-section-collapsible.search-hidden { display: none; }
    .nav-item.search-hidden { display: none !important; }

    .nav-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: none; background: transparent; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; color: rgba(255,255,255,0.6); font-family: inherit; transition: var(--transition); text-align: left; position: relative; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
    .nav-item.active { background: rgba(0,102,204,0.2); color: white; font-weight: 500; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; background: var(--primary); border-radius: 0 3px 3px 0; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .nav-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
    .nav-badge-pro { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
    .nav-badge-lock { color: rgba(255,255,255,0.3); margin-left: auto; }
    .nav-badge-lock svg { width: 14px; height: 14px; }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-footer .sidebar-org-info { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
    .sidebar-footer .sidebar-org-name { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; margin-bottom: 2px; }
    .sidebar-footer .btn-logout { width: 100%; padding: 8px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .sidebar-footer .btn-logout:hover { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.3); color: #e74c3c; }

    .main-content { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; }

    .top-nav { height: var(--topnav-height); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; position: sticky; top: 0; z-index: 50; }
    .top-nav-left { display: flex; align-items: center; gap: 16px; }
    .top-nav-left h1 { font-size: 18px; font-weight: 600; }
    .top-nav-right { display: flex; align-items: center; gap: 12px; }
    .top-nav-right .last-update { font-size: 12px; color: var(--text-muted); }

    .hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--text-primary); padding: 4px; }
    .hamburger svg { width: 24px; height: 24px; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }

    .page-body { padding: 24px 28px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow); border: 1px solid var(--border-light); position: relative; overflow: hidden; transition: var(--transition); }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.blue::before { background: linear-gradient(90deg, #0066CC, #3498db); }
    .stat-card.green::before { background: linear-gradient(90deg, #00A651, #2ecc71); }
    .stat-card.orange::before { background: linear-gradient(90deg, #F5A623, #f39c12); }
    .stat-card.purple::before { background: linear-gradient(90deg, #9B59B6, #a855f7); }
    .stat-card .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .stat-card .stat-icon svg { width: 22px; height: 22px; }
    .stat-card.blue .stat-icon { background: rgba(0,102,204,0.1); color: var(--primary); }
    .stat-card.green .stat-icon { background: rgba(0,166,81,0.1); color: var(--secondary); }
    .stat-card.orange .stat-icon { background: rgba(245,166,35,0.1); color: var(--warning); }
    .stat-card.purple .stat-icon { background: rgba(155,89,182,0.1); color: #9B59B6; }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .stat-card .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; line-height: 1; }
    .stat-card .stat-detail { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

    .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--border-light); }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 15px; font-weight: 600; }
    .card-body { padding: 20px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: rgba(248,250,252,0.5); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(248,250,252,0.5); }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
    .badge-success { background: var(--secondary-light); color: var(--success); }
    .badge-warning { background: #FFF3E0; color: var(--warning); }
    .badge-error { background: #FDECEA; color: var(--error); }
    .badge-info { background: var(--primary-light); color: var(--primary); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.active { background: var(--success); }
    .status-dot.inactive { background: var(--error); }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 14px; margin-bottom: 16px; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border-radius: var(--radius-xl); max-width: 540px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted); transition: var(--transition); border-radius: 6px; }
    .modal-close:hover { background: var(--background); color: var(--text-primary); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
    .alert-error { background: #FDECEA; color: var(--error); }
    .alert-success { background: var(--secondary-light); color: var(--success); }
    .alert-warning { background: #FFF3E0; color: #E65100; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .vehicle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .vehicle-card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-light); transition: var(--transition); }
    .vehicle-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .vehicle-card .vc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .vehicle-card .vc-code { font-size: 16px; font-weight: 700; color: var(--primary); }
    .vehicle-card .vc-status { display: flex; align-items: center; gap: 4px; font-size: 12px; }
    .vehicle-card .vc-details { display: flex; flex-direction: column; gap: 6px; }
    .vehicle-card .vc-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .vehicle-card .vc-label { color: var(--text-muted); }
    .vehicle-card .vc-value { color: var(--text-primary); font-weight: 500; }
    .vehicle-card .vc-actions { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; }

    .chart-container { position: relative; height: 300px; }

    .locked-module { display: flex; align-items: center; justify-content: center; min-height: 400px; padding: 40px; }
    .locked-card { text-align: center; max-width: 400px; padding: 48px 32px; background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); }
    .locked-card .lock-icon { width: 64px; height: 64px; margin: 0 auto 20px; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
    .locked-card .lock-icon svg { width: 32px; height: 32px; color: white; }
    .locked-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .locked-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
    .locked-card .btn-activate { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; padding: 12px 28px; border-radius: var(--radius); font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 14px rgba(245,166,35,0.3); }
    .locked-card .btn-activate:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,166,35,0.4); }

    .active-module-card { text-align: center; padding: 60px 32px; }
    .active-module-card .active-icon { width: 64px; height: 64px; margin: 0 auto 20px; background: var(--secondary-light); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: var(--secondary); }
    .active-module-card .active-icon svg { width: 32px; height: 32px; }
    .active-module-card h3 { font-size: 18px; font-weight: 700; color: var(--secondary); margin-bottom: 8px; }
    .active-module-card p { font-size: 14px; color: var(--text-secondary); }

    .settings-form { max-width: 600px; }
    .settings-form .form-group { margin-bottom: 20px; }
    .settings-section { margin-bottom: 32px; }
    .settings-section h4 { font-size: 14px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }

    @media (max-width: 768px) {
      .main-sidebar { transform: translateX(-100%); }
      .main-sidebar.open { transform: translateX(0); }
      .sidebar-overlay.active { display: block; }
      .main-content { margin-left: 0; }
      .hamburger { display: flex; }
      .page-body { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .vehicle-grid { grid-template-columns: 1fr; }
      .top-nav { padding: 0 16px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 48 48" width="64" height="64">
            <circle cx="24" cy="24" r="22" fill="#0066CC"/>
            <path d="M24 10v28M10 24h28" stroke="white" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Pannello Organizzazione</h1>
        <p>Accedi per gestire la tua organizzazione</p>
      </div>
      <div id="login-error" class="alert alert-error hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="admin@organizzazione.it">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="Password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">
          <span>Accedi</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>
</div>

<div id="app-page" class="hidden">
  <div class="enterprise-layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="main-sidebar" id="main-sidebar">
      <div class="sidebar-brand">
        <span class="brand-name">SOCCORSO DIGITALE</span>
        <span class="brand-subtitle" id="sidebar-org-name">Pannello Organizzazione</span>
      </div>
      <div class="sidebar-search-box">

async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(url, { ...options, headers, credentials: 'include' });
  if (res.status === 401) { logout(); throw new Error('Non autenticato'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Errore del server' }));
    throw new Error(err.error || 'Errore del server');
  }
  return res.json();
}

function getAllModulesMap() {
  const map = {};
  FREE_MODULES.forEach(m => map[m.id] = m);
  PAID_MODULES.forEach(m => map[m.id] = m);
  return map;
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const allModules = getAllModulesMap();
  const chevronSvg = '<svg class="nav-section-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  
  let html = '';
  
  const dashboardMod = allModules['dashboard'];
  if (dashboardMod) {
    html += `<div class="nav-section"><button class="nav-item${currentPage === 'dashboard' ? ' active' : ''}" data-page="dashboard">${dashboardMod.icon}<span>${dashboardMod.label}</span></button></div>`;
  }
  
  let savedState = {};
  try { savedState = JSON.parse(localStorage.getItem('orgSidebarSections') || '{}'); } catch(e) {}
  
  SIDEBAR_SECTIONS.forEach(section => {
    const moduleIds = [...section.freeIds, ...section.paidIds];
    const visibleModules = moduleIds.filter(id => allModules[id]);
    if (visibleModules.length === 0) return;
    
    const isOpen = savedState[section.key] === true;
    
    html += `<div class="nav-section nav-section-collapsible" data-section="${section.key}">`;
    html += `<button class="nav-section-header" aria-expanded="${isOpen}" onclick="toggleOrgNavSection(this)">`;
    html += `<span class="nav-section-header-icon" style="background: ${section.color}20; color: ${section.color};">${section.icon}</span>`;
    html += `<span class="nav-section-header-label">${section.label}</span>`;
    html += `<span class="nav-section-count">${visibleModules.length}</span>`;
    html += chevronSvg;
    html += `</button>`;
    html += `<div class="nav-section-body${isOpen ? ' open' : ''}">`;
    
    visibleModules.forEach(id => {
      const m = allModules[id];
      const isPaid = section.paidIds.includes(id);
      const isUnlocked = enabledModules.includes(id);
      const proBadge = (isPaid && !isUnlocked) ? '<span class="nav-badge nav-badge-pro">PRO</span>' : '';
      html += `<button class="nav-item${currentPage === id ? ' active' : ''}" data-page="${id}">${m.icon}<span>${m.label}</span>${proBadge}</button>`;
    });
    
    html += '</div></div>';
  });
  
  const settingsMod = allModules['impostazioni'];
  if (settingsMod) {
    html += `<div class="nav-section" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06);"><button class="nav-item${currentPage === 'impostazioni' ? ' active' : ''}" data-page="impostazioni">${settingsMod.icon}<span>${settingsMod.label}</span></button></div>`;
  }

  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = btn.dataset.page;
      buildSidebar();
      navigate(currentPage);
      closeMobileSidebar();
    });
  });
  
  initOrgSidebarSearch();
}

function toggleOrgNavSection(headerBtn) {
  const section = headerBtn.closest('.nav-section-collapsible');
  const body = section.querySelector('.nav-section-body');
  const isOpen = body.classList.contains('open');
  if (isOpen) {
    body.classList.remove('open');
    headerBtn.setAttribute('aria-expanded', 'false');
  } else {
    body.classList.add('open');
    headerBtn.setAttribute('aria-expanded', 'true');
  }
  const sectionKey = section.dataset.section;
  if (sectionKey) {
    try {
      const state = JSON.parse(localStorage.getItem('orgSidebarSections') || '{}');
      state[sectionKey] = !isOpen;
      localStorage.setItem('orgSidebarSections', JSON.stringify(state));
    } catch(e) {}
  }
}

function initOrgSidebarSearch() {
  const searchInput = document.getElementById('sidebar-search');
  if (!searchInput || searchInput._orgSearchInit) return;
  searchInput._orgSearchInit = true;
  
  searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    if (!query) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('search-hidden');
        const span = item.querySelector('span');
        if (span) span.innerHTML = span.textContent;
      });
      document.querySelectorAll('.nav-section-collapsible').forEach(s => s.classList.remove('search-hidden'));
      let savedState = {};
      try { savedState = JSON.parse(localStorage.getItem('orgSidebarSections') || '{}'); } catch(e) {}
      document.querySelectorAll('.nav-section-collapsible').forEach(section => {
        const key = section.dataset.section;
        const body = section.querySelector('.nav-section-body');
        const header = section.querySelector('.nav-section-header');
        if (!body || !header) return;
        if (key && savedState[key] === true) { body.classList.add('open'); header.setAttribute('aria-expanded', 'true'); }
        else { body.classList.remove('open'); header.setAttribute('aria-expanded', 'false'); }
      });
      return;
    }
    
    document.querySelectorAll('.nav-section-collapsible').forEach(section => {
      const items = section.querySelectorAll('.nav-item');
      let hasVisible = false;
      items.forEach(item => {
        const span = item.querySelector('span');
        if (!span) return;
        const text = span.textContent.toLowerCase();
        if (text.includes(query)) {
          item.classList.remove('search-hidden');
          hasVisible = true;
          const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
          span.innerHTML = span.textContent.replace(regex, '<mark class="sidebar-search-highlight">$1</mark>');
        } else {
          item.classList.add('search-hidden');
          span.innerHTML = span.textContent;
        }
      });
      if (hasVisible) {
        section.classList.remove('search-hidden');
        const body = section.querySelector('.nav-section-body');
        if (body) body.classList.add('open');
        const header = section.querySelector('.nav-section-header');
        if (header) header.setAttribute('aria-expanded', 'true');
      } else {
        section.classList.add('search-hidden');
      }
    });
    
    const dashboardItem = document.querySelector('.nav-item[data-page="dashboard"]');
    if (dashboardItem) {
      const text = dashboardItem.querySelector('span')?.textContent.toLowerCase() || '';
      dashboardItem.classList.toggle('search-hidden', !text.includes(query));
    }
    const settingsItem = document.querySelector('.nav-item[data-page="impostazioni"]');
    if (settingsItem) {
      const text = settingsItem.querySelector('span')?.textContent.toLowerCase() || '';
      settingsItem.classList.toggle('search-hidden', !text.includes(query));
    }
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
      searchInput.blur();
    }
  });
}

  const email = document.getElementById('login-email').value;

  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  const btn = document.getElementById('login-submit-btn');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Accesso...';

  try {
    const data = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });

    if (data.user.role !== 'org_admin' && data.user.role !== 'admin' && data.user.role !== 'director') {
      errEl.textContent = 'Accesso riservato agli amministratori di organizzazione';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Accedi';
      return;
    }

    authToken = data.token;
    localStorage.setItem('orgAdminToken', data.token);
    await showApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
  btn.disabled = false;
  btn.querySelector('span').textContent = 'Accedi';
});

function logout() {
  authToken = null;
  currentOrg = null;
  enabledModules = [];
  currentPage = 'dashboard';
  localStorage.removeItem('orgAdminToken');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('app-page').classList.add('hidden');
  fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
}

document.getElementById('logout-btn').addEventListener('click', logout);

document.getElementById('refresh-btn').addEventListener('click', () => {
  navigate(currentPage);
});

async function showApp() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app-page').classList.remove('hidden');

  try {
    const orgData = await apiFetch(`${API}/my-org`);
    currentOrg = orgData;
    enabledModules = Array.isArray(orgData.enabledModules) ? orgData.enabledModules : [];
    document.getElementById('sidebar-org-name').textContent = currentOrg.name;
    document.getElementById('footer-org-name').textContent = currentOrg.name;
    document.getElementById('footer-org-status').textContent = `Piano: ${currentOrg.status === 'active' ? 'Attivo' : currentOrg.status === 'trial' ? 'Prova' : currentOrg.status}`;
    buildSidebar();
    navigate('dashboard');
  } catch (err) {
    console.error('Init error:', err);
    document.getElementById('page-body').innerHTML = '<div class="alert alert-error">Errore nel caricamento dei dati dell\'organizzazione.</div>';
  }
}

function navigate(page) {
  currentPage = page;
  updateLastUpdate();
  Object.values(chartsCreated).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartsCreated = {};

  const isPaid = PAID_MODULES.find(m => m.id === page);
  if (isPaid) {
    const isUnlocked = enabledModules.includes(page);
    if (isUnlocked) {
      showActiveModule(isPaid.label);
    } else {
      showLockedModule(isPaid.label);
    }
    return;
  }

  switch (page) {
    case 'dashboard': loadDashboard(); break;
    case 'servizi': loadServizi(); break;
    case 'flotta': loadFlotta(); break;
    case 'anagrafica': loadAnagrafica(); break;
    case 'strutture': loadStrutture(); break;
    case 'analytics': loadAnalytics(); break;
    case 'impostazioni': loadImpostazioni(); break;
  }
}

function showVehicleModal(vehicleId) {
  const v = vehicleId ? orgVehicles.find(x => x.id === vehicleId) : null;
  const locOptions = orgLocations.map(l => `<option value="${l.id}" ${v && v.locationId === l.id ? 'selected' : ''}>${l.name}</option>`).join('');

  showModal(v ? 'Modifica Veicolo' : 'Nuovo Veicolo', `
    <div class="form-group"><label>Codice Veicolo *</label><input id="m-code" value="${v?.code || ''}" required></div>
    <div class="form-row">
      <div class="form-group"><label>Targa</label><input id="m-plate" value="${v?.licensePlate || ''}"></div>
      <div class="form-group"><label>Modello</label><input id="m-model" value="${v?.model || ''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Carburante</label><select id="m-fuel"><option value="Gasolio" ${v?.fuelType === 'Gasolio' ? 'selected' : ''}>Gasolio</option><option value="Benzina" ${v?.fuelType === 'Benzina' ? 'selected' : ''}>Benzina</option><option value="GPL" ${v?.fuelType === 'GPL' ? 'selected' : ''}>GPL</option><option value="Elettrico" ${v?.fuelType === 'Elettrico' ? 'selected' : ''}>Elettrico</option></select></div>
      <div class="form-group"><label>Sede *</label><select id="m-location">${locOptions || '<option value="">Nessuna sede</option>'}</select></div>
    </div>
    ${v ? `<div class="form-group"><label>Stato</label><select id="m-active"><option value="true" ${v.isActive ? 'selected' : ''}>Attivo</option><option value="false" ${!v.isActive ? 'selected' : ''}>Disattivo</option></select></div>` : ''}
    <div id="m-error" class="alert alert-error hidden"></div>
  `, async () => {
    const body = {
      code: document.getElementById('m-code').value,
      licensePlate: document.getElementById('m-plate').value || null,
      model: document.getElementById('m-model').value || null,
      fuelType: document.getElementById('m-fuel').value,
      locationId: document.getElementById('m-location').value,
    };
    if (v) body.isActive = document.getElementById('m-active').value === 'true';

    if (!body.code || !body.locationId) {
      document.getElementById('m-error').textContent = 'Codice e sede sono obbligatori';
      document.getElementById('m-error').classList.remove('hidden');
      return;
    }

    try {
      if (v) {
        await apiFetch(`${API}/my-org/vehicles/${v.id}`, { method: 'PUT', body: JSON.stringify(body) });
      } else {
        await apiFetch(`${API}/my-org/vehicles`, { method: 'POST', body: JSON.stringify(body) });
      }
      closeModal();
      loadFlotta();
    } catch (err) {
      const errEl = document.getElementById('m-error');
      if (errEl) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
    }
  });
}

    document.getElementById('page-body').innerHTML = html;

    function renderStaffTable() {
      const search = document.getElementById('staff-search').value.toLowerCase();
      const roleFilter = document.getElementById('staff-filter-role').value;
      const locFilter = document.getElementById('staff-filter-loc').value;
      const statusFilter = document.getElementById('staff-filter-status').value;
      const contractFilter = document.getElementById('staff-filter-contract').value;

      let filtered = staffList.filter(s => {
        if (search && !(`${s.firstName} ${s.lastName}`).toLowerCase().includes(search) && !(`${s.lastName} ${s.firstName}`).toLowerCase().includes(search)) return false;
        if (roleFilter && s.primaryRole !== roleFilter) return false;
        if (locFilter && s.locationId !== locFilter) return false;
        if (statusFilter === 'active' && !s.isActive) return false;
        if (statusFilter === 'inactive' && s.isActive) return false;
        if (contractFilter && s.contractType !== contractFilter) return false;
        return true;
      });

      document.getElementById('staff-count-badge').textContent = `${filtered.length} membri`;

      if (filtered.length === 0) {
        document.getElementById('staff-tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-muted)">Nessun membro trovato con i filtri selezionati</td></tr>';
        return;
      }

      document.getElementById('staff-tbody').innerHTML = filtered.map(s => `
        <tr>
          <td><strong>${s.lastName}</strong></td>
          <td>${s.firstName}</td>
          <td><span class="badge ${roleBadgeClass[s.primaryRole] || 'badge-info'}">${roleLabels[s.primaryRole] || s.primaryRole}</span></td>
          <td>${locMap[s.locationId] || '-'}</td>
          <td>${contractLabels[s.contractType] || s.contractType || '-'}</td>
          <td>${s.email || '-'}</td>
          <td>${s.phone || '-'}</td>
          <td><span class="status-dot ${s.isActive ? 'active' : 'inactive'}"></span>${s.isActive ? 'Attivo' : 'Non attivo'}</td>
          <td><button class="btn btn-outline btn-sm" onclick="showStaffModal('${s.id}')">Modifica</button></td>
        </tr>
      `).join('');
    }

    renderStaffTable();

    document.getElementById('staff-search').addEventListener('input', renderStaffTable);
    document.getElementById('staff-filter-role').addEventListener('change', renderStaffTable);
    document.getElementById('staff-filter-loc').addEventListener('change', renderStaffTable);
    document.getElementById('staff-filter-status').addEventListener('change', renderStaffTable);
    document.getElementById('staff-filter-contract').addEventListener('change', renderStaffTable);
    document.getElementById('add-staff-btn').onclick = () => showStaffModal();
  } catch (err) {
    document.getElementById('page-body').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  }
}

function showStaffModal(memberId) {
  const s = memberId ? orgStaffMembers.find(x => x.id === memberId) : null;
  const lOptions = orgLocations.map(l => `<option value="${l.id}" ${s && s.locationId === l.id ? 'selected' : ''}>${l.name}</option>`).join('');

  showModal(s ? 'Modifica Membro' : 'Nuovo Membro del Personale', `
    <div class="form-row">
      <div class="form-group"><label>Cognome *</label><input id="m-lastname" value="${s?.lastName || ''}" required></div>
      <div class="form-group"><label>Nome *</label><input id="m-firstname" value="${s?.firstName || ''}" required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Codice Fiscale</label><input id="m-fiscal" value="${s?.fiscalCode || ''}" style="text-transform:uppercase" maxlength="16"></div>
      <div class="form-group"><label>Ruolo Primario *</label><select id="m-role">
        <option value="autista" ${s?.primaryRole === 'autista' ? 'selected' : ''}>Autista</option>
        <option value="soccorritore" ${s?.primaryRole === 'soccorritore' ? 'selected' : ''}>Soccorritore</option>
        <option value="infermiere" ${s?.primaryRole === 'infermiere' ? 'selected' : ''}>Infermiere</option>
        <option value="coordinatore" ${s?.primaryRole === 'coordinatore' ? 'selected' : ''}>Coordinatore</option>
      </select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="m-email" value="${s?.email || ''}"></div>
      <div class="form-group"><label>Telefono</label><input id="m-phone" value="${s?.phone || ''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Sede *</label><select id="m-loc">${lOptions}</select></div>
      <div class="form-group"><label>Tipo Contratto</label><select id="m-contract">
        <option value="volunteer" ${(!s || s?.contractType === 'volunteer') ? 'selected' : ''}>Volontario</option>
        <option value="full_time" ${s?.contractType === 'full_time' ? 'selected' : ''}>Tempo Pieno</option>
        <option value="part_time" ${s?.contractType === 'part_time' ? 'selected' : ''}>Part-Time</option>
      </select></div>
    </div>
    ${s ? `<div class="form-group"><label>Stato</label><select id="m-active"><option value="true" ${s.isActive ? 'selected' : ''}>Attivo</option><option value="false" ${!s.isActive ? 'selected' : ''}>Non attivo</option></select></div>` : ''}
    <div class="form-group"><label>Note</label><textarea id="m-notes" rows="2" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:14px">${s?.notes || ''}</textarea></div>
    <div id="m-error" class="alert alert-error hidden"></div>
  `, async () => {
    const body = {
      firstName: document.getElementById('m-firstname').value.trim(),
      lastName: document.getElementById('m-lastname').value.trim(),
      fiscalCode: document.getElementById('m-fiscal').value.trim().toUpperCase(),
      email: document.getElementById('m-email').value.trim(),
      phone: document.getElementById('m-phone').value.trim(),
      locationId: document.getElementById('m-loc').value,
      primaryRole: document.getElementById('m-role').value,
      contractType: document.getElementById('m-contract').value,
      notes: document.getElementById('m-notes').value.trim(),
    };
    if (s) body.isActive = document.getElementById('m-active').value === 'true';

    if (!body.firstName || !body.lastName || !body.locationId || !body.primaryRole) {
      document.getElementById('m-error').textContent = 'Nome, cognome, sede e ruolo sono obbligatori';
      document.getElementById('m-error').classList.remove('hidden');
      return;
    }

    try {
      if (s) {
        await apiFetch(`${API}/my-org/staff-members/${s.id}`, { method: 'PUT', body: JSON.stringify(body) });
      } else {
        await apiFetch(`${API}/my-org/staff-members`, { method: 'POST', body: JSON.stringify(body) });
      }
      closeModal();
      loadAnagrafica();
    } catch (err) {
      const errEl = document.getElementById('m-error');
      if (errEl) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
    }
  });
}

async function loadAnalytics() {
  document.getElementById('page-title').textContent = 'Analytics Operative';
  document.getElementById('page-body').innerHTML = '<p style="color:var(--text-muted);padding:20px;">Caricamento...</p>';

  try {
    const tripList = await apiFetch(`${API}/my-org/trips`);
    orgTrips = tripList;

    const monthlyData = {};
    const typeData = {};
    tripList.forEach(t => {
      if (t.serviceDate) {
        const d = new Date(t.serviceDate);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        monthlyData[key] = (monthlyData[key] || 0) + 1;
      }
      const type = t.serviceType || 'Altro';
      typeData[type] = (typeData[type] || 0) + 1;
    });

    const sortedMonths = Object.keys(monthlyData).sort();
    const monthLabels = sortedMonths.map(k => {
      const [y, m] = k.split('-');
      return new Date(y, m - 1).toLocaleDateString('it-IT', { month: 'short', year: '2-digit' });
    });

    document.getElementById('page-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card">
          <div class="card-header"><h3>Servizi per Mese</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="chart-monthly"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Servizi per Tipo</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="chart-type"></canvas></div></div>
        </div>
      </div>
    `;

    if (sortedMonths.length > 0) {
      chartsCreated.monthly = new Chart(document.getElementById('chart-monthly'), {
        type: 'bar',
        data: {
          labels: monthLabels,
          datasets: [{ label: 'Servizi', data: sortedMonths.map(k => monthlyData[k]), backgroundColor: 'rgba(0,102,204,0.7)', borderColor: '#0066CC', borderWidth: 1, borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }

    const typeLabels = Object.keys(typeData);
    const typeColors = ['#0066CC', '#00A651', '#F5A623', '#E74C3C', '#9B59B6', '#3498DB', '#e67e22', '#1abc9c'];
    if (typeLabels.length > 0) {
      chartsCreated.type = new Chart(document.getElementById('chart-type'), {
        type: 'pie',
        data: {
          labels: typeLabels,
          datasets: [{ data: typeLabels.map(k => typeData[k]), backgroundColor: typeColors.slice(0, typeLabels.length), borderWidth: 2, borderColor: '#fff' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } } }
      });
    }

    if (tripList.length === 0) {
      document.getElementById('page-body').innerHTML = '<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16V8"/><path d="M11 16V11"/><path d="M15 16V14"/><path d="M19 16V10"/></svg><p>Nessun dato disponibile per le analytics</p></div>';
    }
  } catch (err) {
    document.getElementById('page-body').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  }
}

function showModal(title, content, onSave) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3>${title}</h3>
          <button class="modal-close" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">${content}</div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
          <button class="btn btn-primary" id="modal-save-btn">Salva</button>
        </div>
      </div>
    </div>
  `;
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.onclick = async () => {
    saveBtn.disabled = true;
    try {
      await onSave();
    } finally {
      if (document.getElementById('modal-save-btn')) saveBtn.disabled = false;
    }
  };
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

(async function init() {
  const savedToken = localStorage.getItem('orgAdminToken');
  if (savedToken) {
    authToken = savedToken;
    try {
      await showApp();
    } catch {
      logout();
    }
  }
})();
